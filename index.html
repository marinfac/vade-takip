<!DOCTYPE html>
<html lang="tr">
<head>

    <title>Vade Takip - Giriş</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 100%);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            padding: max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
        }

        .auth-container {
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #2e7d32;
            font-size: clamp(22px, 5vw, 28px);
            margin-bottom: 10px;
        }

        .logo p {
            color: #666;
            font-size: clamp(12px, 3vw, 14px);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #2e7d32;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
            touch-action: manipulation;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%);
            color: white;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: white;
            color: #2e7d32;
            border: 2px solid #2e7d32;
        }

        .btn-secondary:active {
            background: #f1f8f4;
        }

        .hidden {
            display: none;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2e7d32;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 25px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <h1>💰 Vade Takip</h1>
            <p>Atlaspet Pet Ürünleri</p>
        </div>

        <div class="spinner" id="loading"></div>
        <div class="error-message" id="error-message"></div>
        <div class="success-message" id="success-message"></div>

        <div id="login-form">
            <div class="form-group">
                <label>E-posta</label>
                <input type="email" id="login-email" placeholder="ornek@atlaspet.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label>Şifre</label>
                <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button class="btn btn-primary" onclick="handleLogin()">🔐 Giriş Yap</button>
            <button class="btn btn-secondary" onclick="showRegister()">📝 Hesap Oluştur</button>
        </div>

        <div id="register-form" class="hidden">
            <div class="form-group">
                <label>Ad Soyad</label>
                <input type="text" id="register-name" placeholder="Ali Demir" required autocomplete="name">
            </div>

            <div class="form-group">
                <label>E-posta</label>
                <input type="email" id="register-email" placeholder="ornek@atlaspet.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label>Şifre (En az 6 karakter)</label>
                <input type="password" id="register-password" placeholder="••••••••" required autocomplete="new-password">
            </div>

            <button class="btn btn-primary" onclick="handleRegister()">✅ Hesap Oluştur</button>
            <button class="btn btn-secondary" onclick="showLogin()">🔙 Giriş Sayfası</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, updateProfile } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getFirestore } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBYPR95I6kne2Hlm4fvq14SRTJnnBR9PY8",
            authDomain: "vade-takip-atlaspet.firebaseapp.com",
            projectId: "vade-takip-atlaspet",
            storageBucket: "vade-takip-atlaspet.firebasestorage.app",
            messagingSenderId: "779701135013",
            appId: "1:779701135013:web:cd114d61d1a90c227e0f4c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.firebaseAuth = auth;
        window.firebaseDb = db;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'dashboard.html';
            }
        });

        // Service Worker (PWA) - Inline
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'vade-takip-v1';
                const urlsToCache = ['/', '/index.html', '/dashboard.html'];
                self.addEventListener('install', e => {
                    e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache)));
                });
                self.addEventListener('fetch', e => {
                    e.respondWith(caches.match(e.request).then(response => response || fetch(e.request)));
                });
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl);
        }
    </script>

    <script>
        function showRegister() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
            clearMessages();
        }

        function showLogin() {
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
            clearMessages();
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function showError(message) {
            const errorEl = document.getElementById('error-message');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            setTimeout(() => errorEl.style.display = 'none', 5000);
        }

        function showSuccess(message) {
            const successEl = document.getElementById('success-message');
            successEl.textContent = message;
            successEl.style.display = 'block';
            setTimeout(() => successEl.style.display = 'none', 3000);
        }

        function clearMessages() {
            document.getElementById('error-message').style.display = 'none';
            document.getElementById('success-message').style.display = 'none';
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            if (!email || !password) {
                showError('Lütfen tüm alanları doldurun!');
                return;
            }

            showLoading(true);
            clearMessages();

            try {
                const { signInWithEmailAndPassword } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js');
                await signInWithEmailAndPassword(window.firebaseAuth, email, password);
            } catch (error) {
                showLoading(false);
                let errorMessage = 'Giriş başarısız!';
                
                if (error.code === 'auth/invalid-credential') {
                    errorMessage = 'E-posta veya şifre hatalı!';
                } else if (error.code === 'auth/user-not-found') {
                    errorMessage = 'Bu e-posta ile kayıtlı kullanıcı bulunamadı!';
                } else if (error.code === 'auth/wrong-password') {
                    errorMessage = 'Şifre hatalı!';
                } else if (error.code === 'auth/too-many-requests') {
                    errorMessage = 'Çok fazla başarısız deneme. Lütfen daha sonra tekrar deneyin.';
                }
                
                showError(errorMessage);
            }
        }

        async function handleRegister() {
            const name = document.getElementById('register-name').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;

            if (!name || !email || !password) {
                showError('Lütfen tüm alanları doldurun!');
                return;
            }

            if (password.length < 6) {
                showError('Şifre en az 6 karakter olmalıdır!');
                return;
            }

            showLoading(true);
            clearMessages();

            try {
                const { createUserWithEmailAndPassword, updateProfile } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js');
                const { doc, setDoc } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
                
                const userCredential = await createUserWithEmailAndPassword(window.firebaseAuth, email, password);
                
                await updateProfile(userCredential.user, {
                    displayName: name
                });

                // Firestore'a kullanıcı kaydet (pending durumunda)
                await setDoc(doc(window.firebaseDb, 'users', userCredential.user.uid), {
                    name: name,
                    email: email,
                    status: 'pending',
                    createdAt: new Date().toISOString()
                });

                showSuccess('Hesap oluşturuldu! Admin onayı bekleniyor...');
                
                // 2 saniye sonra çıkış yap
                setTimeout(async () => {
                    await window.firebaseAuth.signOut();
                    showLogin();
                    showLoading(false);
                }, 2000);
            } catch (error) {
                showLoading(false);
                let errorMessage = 'Kayıt başarısız!';
                
                if (error.code === 'auth/email-already-in-use') {
                    errorMessage = 'Bu e-posta adresi zaten kullanımda!';
                } else if (error.code === 'auth/invalid-email') {
                    errorMessage = 'Geçersiz e-posta adresi!';
                } else if (error.code === 'auth/weak-password') {
                    errorMessage = 'Şifre çok zayıf. Daha güçlü bir şifre seçin!';
                }
                
                showError(errorMessage);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('login-password').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') handleLogin();
            });
            document.getElementById('register-password').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') handleRegister();
            });
        });
    </script>
</body>
